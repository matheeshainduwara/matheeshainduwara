name: 🔄 Auto-Update Profile README

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-blog-posts:
    name: 📝 Fetch Latest Blog Posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@matheeshainduwara"
          max_post_count: 5
          readme_path: "./README.md"
          comment_tag_name: "BLOG-POST-LIST"
          date_format: "yyyy-MM-dd"
          template: "- 📝 **[$title]($url)** — `$date`"
          filter_comments: "medium"
          committer_username: "github-actions[bot]"
          committer_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "chore(readme): update blog posts [skip ci]"

  update-timestamp:
    name: 🕐 Update Timestamp Badge
    runs-on: ubuntu-latest
    needs: [update-blog-posts]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull origin main

      - name: Inject today's date into badge
        run: |
          DATE=$(date +'%B %d, %Y' | sed 's/ /%20/g')
          sed -i "s|Last%20Updated-[^-]*-|Last%20Updated-${DATE}-|g" README.md

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(readme): update timestamp [skip ci]"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          file_pattern: README.md
