name: 🔄 Auto-Update Profile README

on:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-readme:
    name: 📝 Update README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update header greeting based on time
        run: |
          python3 << 'EOF'
          from datetime import datetime
          import re
          import urllib.parse
          from zoneinfo import ZoneInfo

          hour = datetime.now(ZoneInfo("Asia/Colombo")).hour

          print(f"🕐 Current Sri Lanka hour: {hour}")

          if 5 <= hour < 12:
              greeting = "🌅 Good morning! - ready to build something cool today?"
              cache_token = "morning"
          elif 12 <= hour < 17:
              greeting = " ☀️ Good afternoon! - hope the code's flowing well"
              cache_token = "afternoon"
          elif 17 <= hour < 21:
              greeting = "🌆 Good evening! - thanks for checking out my work"
              cache_token = "evening"
          else:
              greeting = "🌙 Burning the midnight oil too? Welcome!"
              cache_token = "night"

          print(f"🎨 Theme: {cache_token}")
          print(f"💬 Greeting: {greeting}")

          encoded_greeting = urllib.parse.quote(greeting)

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          new_header = f'<img src="https://capsule-render.vercel.app/api?type=waving&color=0:0f0c29,50:302b63,100:24243e&height=160&section=header&text=Hey,%20I%27m%20Matheesha%20👋&fontSize=36&fontColor=ffffff&fontAlignY=35&desc={encoded_greeting}&descAlignY=60&descSize=16&animation=fadeIn&v={cache_token}" width="100%" alt="header"/>'

          pattern = r"<!-- HEADER:START -->.*?<!-- HEADER:END -->"
          replacement = f"<!-- HEADER:START -->\n{new_header}\n<!-- HEADER:END -->"
          new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)

          print(f"✅ README header updated!")
          EOF

      - name: Fetch Medium posts and update README
        run: |
          python3 << 'EOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import re
          from datetime import datetime

          url = "https://medium.com/feed/@matheeshainduwara"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req) as response:
              xml_data = response.read()

          root = ET.fromstring(xml_data)
          channel = root.find("channel")
          items = channel.findall("item")[:3]

          lines = []
          for item in items:
              title = item.find("title").text.strip().rstrip(".")
              raw_url = item.find("link").text.strip()
              clean_url = raw_url.split("?source=")[0]
              pub_date = item.find("pubDate").text.strip()
              try:
                  dt = datetime.strptime(pub_date, "%a, %d %b %Y %H:%M:%S %Z")
                  date_str = dt.strftime("%b %d, %Y")
              except:
                  date_str = pub_date[:16]
              lines.append(f"- 📝 **[{title}]({clean_url})** — `{date_str}`")

          blog_content = "\n".join(lines)

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          pattern = r"<!-- BLOG-POST-LIST:START -->.*?<!-- BLOG-POST-LIST:END -->"
          replacement = f"<!-- BLOG-POST-LIST:START -->\n{blog_content}\n<!-- BLOG-POST-LIST:END -->"
          new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)

          print("✅ Blog posts updated!")
          EOF

      - name: Update timestamp badge
        run: |
          DATE=$(date +'%B %d, %Y' | sed 's/ /%20/g')
          sed -i "s|Last%20Updated-[^-]*-|Last%20Updated-${DATE}-|g" README.md
          echo "✅ Timestamp updated!"

      - name: Pull latest before commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(readme): update greeting, blog posts & timestamp [skip ci]"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          file_pattern: README.md
          push_options: "--force-with-lease"
