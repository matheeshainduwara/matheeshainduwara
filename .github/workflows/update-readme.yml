name: 🔄 Auto-Update Profile README

on:
  # Run every day at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"

  # Also run on every push to main
  push:
    branches:
      - main

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  # ── JOB 1: Update blog posts from RSS feed ─────────────────────
  update-blog-posts:
    name: 📝 Fetch Latest Blog Posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest blog posts (Dev.to / Hashnode / any RSS)
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
         
          feed_list: "https://medium.com/@matheeshainduwara"
          max_post_count: 5
          readme_path: "./README.md"
          comment_tag_name: "BLOG-POST-LIST"
          date_format: "MMM DD, YYYY"
          template: "- [$title]($url) — *$date*"

  # ── JOB 2: Update WakaTime coding stats ────────────────────────
  update-wakatime:
    name: ⏱️ Fetch WakaTime Stats
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update WakaTime stats
        uses: anmol098/waka-readme-stats@master
        with:
          # 🔑 Add WAKATIME_API_KEY to your repo secrets:
          # Settings → Secrets → Actions → New repository secret
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_OS: "True"
          SHOW_PROJECTS: "True"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_LOC_CHART: "False"
          # Sections to replace in README.md:
          START_COMMENT: "WAKATIME-STATS:START"
          END_COMMENT: "WAKATIME-STATS:END"

  # ── JOB 3: Stamp a "Last Updated" date into the README ─────────
  update-timestamp:
    name: 🕐 Update Timestamp Badge
    runs-on: ubuntu-latest
    needs: [update-blog-posts]   # run after blog posts are updated
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject today's date into badge
        run: |
          DATE=$(date +'%B %d, %Y' | sed 's/ /%20/g')
          sed -i "s|Last%20Updated-[^-]*-|Last%20Updated-${DATE}-|g" README.md

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(readme): auto-update [skip ci]"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          file_pattern: README.md
